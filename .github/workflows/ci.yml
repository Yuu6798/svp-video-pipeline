name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  markdown-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint README formatting
        run: |
          test -f README.md
          grep -q '[^[:space:]]' README.md
