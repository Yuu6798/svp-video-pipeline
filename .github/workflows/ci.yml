name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  markdown-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint README formatting
        run: |
          test -f README.md
          grep -q '[^[:space:]]' README.md

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']
    defaults:
      run:
        working-directory: svp_pipeline
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: svp_pipeline/pyproject.toml

      - name: Install
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check src tests

      - name: Test
        env:
          # Rich/Typer の help 出力に挿入される ANSI コードで test_cli の
          # 部分文字列マッチが壊れるのを防ぐ。TERM=dumb で Rich はプレーン出力。
          TERM: dumb
        run: pytest tests/ -q --tb=short
